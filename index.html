<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brukertesting – Prototyper</title>
<link rel="stylesheet" href="https://cdn.tripletex.no/google-fonts/rubik-400-500-800.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-100: #0a41fa;
    --blue-5: #f2f5ff;
    --blue-20: #ced9fe;
    --grey-5: #f4f5f6;
    --grey-10: #e9eaed;
    --grey-20: #d5d7db;
    --grey-60: #818794;
    --grey-80: #51596a;
    --grey-100: #2e384d;
  }

  body {
    font: 14px/1.5 "Rubik", sans-serif;
    color: var(--grey-100);
    background: #f7f8fc;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 64px 32px;
  }

  .page { width: 100%; max-width: 560px; }

  .header { margin-bottom: 32px; }
  .header-label {
    font: 500 12px/1 "Rubik", sans-serif;
    color: var(--grey-60);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .header-title {
    font: 500 22px/1.3 "Rubik", sans-serif;
    color: var(--grey-100);
  }

  .cards { display: flex; flex-direction: column; gap: 12px; }

  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 20px;
    background: #fff;
    border: 1px solid var(--grey-10);
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    border-color: var(--blue-20);
    box-shadow: 0 2px 10px rgba(10,65,250,0.08);
  }

  .card-icon {
    width: 40px;
    height: 40px;
    background: var(--blue-5);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--blue-100);
    flex-shrink: 0;
  }

  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font: 500 15px/1.3 "Rubik", sans-serif;
    color: var(--grey-100);
    margin-bottom: 3px;
  }
  .card-desc {
    font: 13px/1.4 "Rubik", sans-serif;
    color: var(--grey-60);
  }

  .card-arrow { color: var(--grey-20); flex-shrink: 0; }
  .card:hover .card-arrow { color: var(--blue-100); }
</style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="header-label">Brukertesting</div>
    <div class="header-title">Velg en prototype</div>
  </div>

  <div class="cards">

    <a class="card" href="varsel.html" target="_blank" rel="noopener">
      <div class="card-icon">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="none">
          <path d="M3 12V8M7 12V5M11 12V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-title">Avstemming av NAV-refusjoner</div>
        <div class="card-desc">Start her og klikk deg gjennom prototypen</div>
      </div>
      <svg class="card-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>

    <a class="card" href="fraværsstatistikk.html" target="_blank" rel="noopener">
      <div class="card-icon">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M5 2v2M11 2v2M2 7h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M5 10h2M5 12h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-title">Fraværsstatistikk</div>
        <div class="card-desc">Statistikk og oversikt over fravær</div>
      </div>
      <svg class="card-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>

  </div>
</div>

</body>
</html>
